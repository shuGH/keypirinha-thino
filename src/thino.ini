#
# Codic Package configuration file
# More info at http://keypirinha.com
#

[defaults]
# デフォルトセクション。フォルダやテンプレートをまとめて定義し、ラベル付きエントリの初期値となる / Default section defining base values for labeled catalog entries
# * フォルダ指定がないと出力先が決まらない / * Without folder definition output target remains undefined
# * strftime 形式で当日分のファイルパスを動的生成可能 / * strftime template allows dynamic per-day file paths
folder =

# 追記対象ファイルの相対・絶対パス（例: %Y/%m/%Y-%m-%d.md cf. https://docs.python.org/3/library/datetime.html#strftime-strptime-behavior） / Relative or absolute target file path (e.g. %Y/%m/%Y-%m-%d.md, cf. Python strftime)
# * Default: {date}.md
# * %Y/%m/%Y-%m-%d.md のように階層化も可能 / * Hierarchical paths such as %Y/%m/%Y-%m-%d.md allowed
file_path =

# メモ追記行のテンプレート。{timestamp}・{memo}・{date} を含めたフォーマットを利用可 / Template for appended line, supports {timestamp}, {memo}, {date}
# * Default: [{timestamp}] {memo}
memo_template =

# ファイル未作成時に先行出力する note_template 定義。YAML フロントマター等も記述可 / note_template used when file missing, can include YAML front matter
note_template =

# yes にすると既存ファイル追記前に空行を挿入し、前行との連続を防止 / Set yes to insert blank line before appending to existing file
ensure_blank_line = yes

[custom_item/example]
# デフォルトとは別に複数の `custom_item/*` セクションを定義して
# ラベルやテンプレートを切り替えたカタログエントリを追加可能 / Additional `custom_item/*` sections allow varying labels/templates
enable = yes
item_label = Thino: Example
folder =
file_path =
memo_template =
note_template =
ensure_blank_line = yes

[var]
# 必要であれば変数を定義し、設定全体で展開可能 / Define reusable variables if needed
# Predefined values from Keypirinha (APP_DIR, PROFILE_DIR, etc.) are already available

[env]
# Keypirinha が常に用意するセクション。${env:PATH} などで環境変数を参照可能 / Keypirinha always provides this section; reference ${env:PATH}
